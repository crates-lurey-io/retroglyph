<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="theme-color" content="#0d1117" />
    <title>retroglyph — __EXAMPLE__ (Headless)</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: #0d1117;
        color: #e6edf3;
        overscroll-behavior: none;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem;
        min-height: 100%;
      }
      #screen {
        /* Hugs #grid's intrinsic 50ch x 25-line size (see below) instead of
           being sized independently -- max-width bounds it on wide
           viewports, font-size (clamped by viewport width) shrinks it on
           narrow ones, and because #grid's own dimensions are expressed in
           ch/em (relative to that same font-size), the two always agree.
           The old version sized this box via a fixed `aspect-ratio` while
           #grid's font-size floated independently off `vw` -- the two only
           agreed by coincidence at one specific viewport width, so most of
           the time #grid didn't fill #screen (a gap on the right) and/or
           overflowed it vertically (rows clipped by `overflow: hidden`). */
        width: fit-content;
        max-width: min(100%, 46rem);
        background: #000;
        color: #c9d1d9;
        border: 1px solid #30363d;
        border-radius: 6px;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: clamp(0.5rem, 1.6vw, 0.95rem);
        line-height: 1.15;
        white-space: pre;
        overflow: hidden;
        padding: 0.5rem;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      /* The grid text itself, sized to exactly 50 columns x 25 lines in
         units relative to #screen's own font-size (ch = width of the "0"
         glyph at the current font-size in a monospace font; the line-height
         factor mirrors #screen's `line-height: 1.15`) -- not derived from
         the viewport independently of #screen, so it can never disagree
         with the box around it regardless of how much that box shrinks or
         grows. Kept as a separate inline-block element (rather than sizing
         #screen directly) so pointer events can be mapped to cell
         coordinates by measuring the *text's* bounding box, not the padded
         #screen box.
      */
      #grid {
        display: inline-block;
        font: inherit;
        width: 50ch;
        height: calc(25 * 1.15em);
      }
      #toolbar {
        display: grid;
        grid-template-columns: repeat(3, minmax(3rem, 4rem));
        grid-template-rows: repeat(2, minmax(3rem, 3.5rem));
        gap: 0.4rem;
        justify-content: center;
      }
      #toolbar button {
        font-size: 1.3rem;
        font-family: inherit;
        border: 1px solid #30363d;
        border-radius: 6px;
        background: #161b22;
        color: #e6edf3;
        touch-action: manipulation;
        -webkit-user-select: none;
        user-select: none;
      }
      #toolbar button:active {
        background: #21262d;
      }
      #toolbar .up {
        grid-column: 2;
        grid-row: 1;
      }
      #toolbar .left {
        grid-column: 1;
        grid-row: 2;
      }
      #toolbar .down {
        grid-column: 2;
        grid-row: 2;
      }
      #toolbar .right {
        grid-column: 3;
        grid-row: 2;
      }
      #toolbar .quit {
        grid-column: 1 / span 3;
        grid-row: 3;
        font-size: 0.85rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      p.hint {
        color: #8b949e;
        font-size: 0.75rem;
        text-align: center;
        max-width: 30rem;
      }
      a.back {
        color: #58a6ff;
        text-decoration: none;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <pre id="screen"><code id="grid">loading…</code></pre>

    <div id="toolbar">
      <button class="up" data-key="up" aria-label="Up">&uarr;</button>
      <button class="left" data-key="left" aria-label="Left">&larr;</button>
      <button class="down" data-key="down" aria-label="Down">&darr;</button>
      <button class="right" data-key="right" aria-label="Right">&rarr;</button>
      <button class="quit" data-key="quit" aria-label="Quit">Q / Esc</button>
    </div>

    <p class="hint">
      Tap, drag, and scroll directly on the screen; arrow keys (or WASD) also work with a
      physical keyboard. This demo renders as plain text — no canvas, no WebGL — via the same
      <code>Headless</code> backend used in tests.
    </p>
    <a class="back" href="../../">&larr; Back to all examples</a>

    <script type="module">
      import init, {
        wasm_headless_init,
        wasm_headless_push_key,
        wasm_headless_push_mouse,
        wasm_headless_tick,
      } from './__EXAMPLE__.js';

      // Mirrors the FFI encoding documented on
      // retroglyph_examples::util::wasm_headless::decode_key: printable
      // characters pass through as their Unicode codepoint; special keys use
      // codepoints above the valid `char` range (0x110000+).
      const SPECIAL_BASE = 0x00110000;
      const SPECIAL = {
        left: SPECIAL_BASE + 2,
        right: SPECIAL_BASE + 3,
        up: SPECIAL_BASE + 4,
        down: SPECIAL_BASE + 5,
        escape: SPECIAL_BASE + 14,
      };
      const MOD_SHIFT = 0b001;
      const MOD_CONTROL = 0b010;
      const MOD_ALT = 0b100;

      const screen = document.getElementById('screen');
      const grid = document.getElementById('grid');

      function pushKey(code, mods = 0) {
        wasm_headless_push_key(code >>> 0, mods & 0xff);
      }

      // ── Pointer input (tap, drag, scroll) ─────────────────────────────
      //
      // Maps pointer pixels to the fixed 50x25 cell grid and forwards them
      // via wasm_headless_push_mouse. `kind` mirrors
      // retroglyph_examples::util::wasm_pointer::decode_mouse:
      // 0 down, 1 up, 2 move (drag), 3 scroll up, 4 scroll down.
      const COLS = 50;
      const ROWS = 25;
      const KIND_DOWN = 0;
      const KIND_UP = 1;
      const KIND_MOVE = 2;
      const KIND_SCROLL_UP = 3;
      const KIND_SCROLL_DOWN = 4;

      function cellFromPointer(event) {
        const rect = grid.getBoundingClientRect();
        if (rect.width <= 0 || rect.height <= 0) return null;
        const fx = (event.clientX - rect.left) / rect.width;
        const fy = (event.clientY - rect.top) / rect.height;
        return {
          x: Math.min(COLS - 1, Math.max(0, Math.floor(fx * COLS))),
          y: Math.min(ROWS - 1, Math.max(0, Math.floor(fy * ROWS))),
        };
      }

      // Track a single pointer (first finger / left button) so a stray
      // second finger can't teleport an in-progress drag.
      let activePointer = null;
      let lastCell = null;

      screen.addEventListener('pointerdown', (event) => {
        if (activePointer !== null) return;
        event.preventDefault();
        activePointer = event.pointerId;
        screen.setPointerCapture(event.pointerId);
        const cell = cellFromPointer(event);
        if (!cell) return;
        lastCell = cell;
        wasm_headless_push_mouse(cell.x, cell.y, KIND_DOWN);
      });

      screen.addEventListener('pointermove', (event) => {
        if (event.pointerId !== activePointer) return;
        const cell = cellFromPointer(event);
        // Dedupe: only forward drag moves that actually cross a cell edge.
        if (!cell || (lastCell && cell.x === lastCell.x && cell.y === lastCell.y)) return;
        lastCell = cell;
        wasm_headless_push_mouse(cell.x, cell.y, KIND_MOVE);
      });

      for (const type of ['pointerup', 'pointercancel']) {
        screen.addEventListener(type, (event) => {
          if (event.pointerId !== activePointer) return;
          activePointer = null;
          const cell = cellFromPointer(event) ?? lastCell;
          lastCell = null;
          if (!cell) return;
          wasm_headless_push_mouse(cell.x, cell.y, KIND_UP);
        });
      }

      screen.addEventListener(
        'wheel',
        (event) => {
          event.preventDefault();
          const cell = cellFromPointer(event);
          if (!cell) return;
          const kind = event.deltaY < 0 ? KIND_SCROLL_UP : KIND_SCROLL_DOWN;
          wasm_headless_push_mouse(cell.x, cell.y, kind);
        },
        { passive: false },
      );

      function pushButtonKey(name) {
        switch (name) {
          case 'up':
            pushKey(SPECIAL.up);
            break;
          case 'down':
            pushKey(SPECIAL.down);
            break;
          case 'left':
            pushKey(SPECIAL.left);
            break;
          case 'right':
            pushKey(SPECIAL.right);
            break;
          case 'quit':
            pushKey(SPECIAL.escape);
            break;
        }
      }

      // Keyboard input (desktop). `event.key` is already a single codepoint
      // for printable keys; special keys are matched by name.
      window.addEventListener('keydown', (event) => {
        let code;
        switch (event.key) {
          case 'ArrowUp':
            code = SPECIAL.up;
            break;
          case 'ArrowDown':
            code = SPECIAL.down;
            break;
          case 'ArrowLeft':
            code = SPECIAL.left;
            break;
          case 'ArrowRight':
            code = SPECIAL.right;
            break;
          case 'Escape':
            code = SPECIAL.escape;
            break;
          default:
            if (event.key.length === 1) {
              code = event.key.codePointAt(0);
            }
        }
        if (code === undefined) {
          return;
        }
        let mods = 0;
        if (event.shiftKey) mods |= MOD_SHIFT;
        if (event.ctrlKey) mods |= MOD_CONTROL;
        if (event.altKey) mods |= MOD_ALT;
        pushKey(code, mods);
        event.preventDefault();
      });

      // Touch/click toolbar. `pointerdown` (not `click`) keeps repeat-tap
      // latency low on mobile and avoids the ~300ms tap-delay some mobile
      // browsers still apply to `click`.
      for (const button of document.querySelectorAll('#toolbar button')) {
        button.addEventListener('pointerdown', (event) => {
          event.preventDefault();
          pushButtonKey(button.dataset.key);
        });
      }

      async function main() {
        await init();
        wasm_headless_init();

        function frame() {
          grid.textContent = wasm_headless_tick();
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
      }

      main();
    </script>
  </body>
</html>
