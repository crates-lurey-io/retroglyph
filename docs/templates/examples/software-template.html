<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="__EXAMPLE__" />
    <meta name="theme-color" content="#0d1117" />
    <meta name="color-scheme" content="dark" />
    <!-- Enables "Add to Home Screen" -> standalone display (no browser
         chrome) on Android/Chrome; iOS Safari ignores the manifest for this
         and instead relies on the apple-mobile-web-app-* meta tags above.
         No icons are declared here -- see docs/templates/examples/README
         (or the sibling .webmanifest file) for why: without real icon
         assets in the repo, a fabricated icons array would 404. Add
         192x192 and 512x512 PNG icons (plus an apple-touch-icon link, which
         iOS requires separately and does not read from the manifest) to
         make this genuinely installable with a home-screen icon. -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>retroglyph — __EXAMPLE__ (Software)</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: #000;
        overflow: hidden;
        width: 100%;
        height: 100%;
        overscroll-behavior: none;
      }
      canvas {
        display: block;
        touch-action: none;
        /* retroglyph-window sets the canvas's inline size to the browser
           viewport at startup and on every `resize` event (winit's web
           backend doesn't derive canvas size from page CSS -- see
           crates/window/src/winit/run.rs), so this is mostly a fallback for
           the first paint before that JS runs. `dvw`/`dvh` (dynamic
           viewport units) come after the `vw`/`vh` fallback so mobile
           browsers that account for retracting address bars don't leave a
           sliver of the page scrollable underneath. */
        width: 100vw;
        height: 100vh;
        width: 100dvw;
        height: 100dvh;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import init from './__EXAMPLE__.js';
      init();
    </script>
  </body>
</html>
