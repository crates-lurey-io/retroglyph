      }
      .fork-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.35rem 0.75rem;
        border: 1px solid #30363d;
        border-radius: 6px;
        color: #e6edf3;
        text-decoration: none;
        font-size: 0.8rem;
        font-weight: 500;
        transition: background 0.15s, border-color 0.15s;
      }
      .fork-btn:hover { background: #161b22; border-color: #8b949e; }

        font-size: 1.05rem;
        margin-bottom: 2rem;
        line-height: 1.5;
      }
      nav {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      nav a {
        display: block;
        padding: 0.9rem 1.5rem;
        border-radius: 8px;
        text-decoration: none;
        font-size: 1rem;
        font-weight: 500;
        transition: background 0.15s, color 0.15s;
      }
      nav a.primary {
        background: #238636;
        color: #fff;
      }
      nav a.primary:hover { background: #2ea043; }
      nav a.secondary {
        border: 1px solid #30363d;
        color: #e6edf3;
      }
      nav a.secondary:hover { background: #161b22; border-color: #8b949e; }
      footer {
        margin-top: auto;
        padding: 1.5rem;
        color: #484f58;
