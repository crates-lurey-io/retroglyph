codecov:
  require_ci_to_pass: false

coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

flags:
  retroglyph:
    paths:
      - src/
    carryforward: true

comment:
  layout: condensed_header, condensed_files, condensed_footer
  behavior: default
  require_changes: true
