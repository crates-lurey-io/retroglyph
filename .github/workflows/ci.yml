name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Feeds test-wasm's `if:` below: crates/terminal-wasm's own tree, the two crates it depends
  # on (core, terminal), and the workspace-wide files that affect how it's built/tested --
  # Cargo.toml (pins wasm-pack/wasm-bindgen-cli versions in [workspace.metadata.bin] and default
  # wasm-bindgen resolution), Cargo.lock, .cargo/config.toml, the Justfile recipe itself, and this
  # workflow file. Every other job stays unconditional.
  changes:
    runs-on: ubuntu-latest
    outputs:
      wasm: ${{ steps.filter.outputs.wasm }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            wasm:
              - 'crates/core/**'
              - 'crates/terminal/**'
              - 'crates/terminal-wasm/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - 'Justfile'
              - '.github/workflows/ci.yml'

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/package-lock.json
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: npm ci --prefix tools
      - run: just rustfmt
      - run: just prettier

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/package-lock.json
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: npm ci --prefix tools
      - run: just clippy
      - run: just markdown
      - run: just deny-advisories
        continue-on-error: true
      - run: just deny-licenses

  docs:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - uses: cargo-bins/cargo-binstall@v1.13.0
      - run: cargo binstall cargo-llms-txt --no-confirm -q
      - run: just doc

  compile:
    name: compile ${{ matrix.toolchain }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, 1.88]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just compile

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just,nextest
      - run: just test-ci
      # Powers https://app.codecov.io/gh/crates-lurey-io/retroglyph/tests (flaky-test detection,
      # failure rate, run time trends). Reads the JUnit XML the `ci` nextest profile writes to
      # `target/nextest/ci/junit.xml` (see .config/nextest.toml). Runs even if `just test-ci`
      # failed above (`!cancelled()`, not just `always()`, so a *cancelled* run still skips it) --
      # failed runs are exactly the ones Test Analytics most wants to see.
      #
      # Uses codecov/codecov-action (same action as the `coverage` job below) with
      # `report_type: test_results`, not the separate codecov/test-results-action: that action's
      # own README says it's being deprecated in favor of this, and its highest published tag is
      # `v1` -- the `v5` tag some Codecov docs reference for it doesn't exist.
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: target/nextest/ci/junit.xml
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}

  test-wasm:
    needs: changes
    if: needs.changes.outputs.wasm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      # `just test-wasm` runs everything through `cargo bin` (cargo-run-bin), which installs the
      # versions pinned in Cargo.toml's [workspace.metadata.bin] into ./.bin -- not $CARGO_HOME/bin
      # -- so a plain taiki-e/install-action install of wasm-pack/wasm-bindgen-cli onto PATH would
      # never be seen by it. Two things actually make that install fast instead of a from-source
      # `cargo install` on every run: cargo-binstall on PATH (cargo-run-bin prefers it over
      # building from source, same as the Build WASM examples step in docs.yml) as a cold-cache
      # fallback, and caching ./.bin itself so a warm cache skips the install step entirely.
      - uses: cargo-bins/cargo-binstall@v1.13.0
      - uses: Swatinem/rust-cache@v2
        with:
          cache-directories: .bin
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just test-wasm

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Generate coverage
        run: just coverage-ci
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          # One combined workspace lcov.info, attributed per crate: each flag below is
          # scoped by its own `paths:` in codecov.yml, so a single upload still yields
          # per-crate coverage numbers instead of one blended workspace figure.
          flags: core,terminal,crossterm,terminal-wasm,software,window,widgets
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  required:
    runs-on: ubuntu-latest
    needs:
      - changes
      - format
      - lint
      - docs
      - compile
      - test
      - test-wasm
      - coverage
    if: ${{ always() }}
    steps:
      - name: Check required jobs
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          echo "$NEEDS_JSON"
          has_failed="${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}"
          if [ "$has_failed" = "true" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs passed."
