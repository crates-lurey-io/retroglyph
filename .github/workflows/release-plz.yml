name: Release-plz

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Publish crates whose Cargo.toml version doesn't match the last release-plz PR's tag yet --
  # i.e. runs after a release-plz PR (job below) has been reviewed and merged.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    # Gates the actual crates.io publish behind a required reviewer + main-only branch policy
    # (github.com/crates-lurey-io/retroglyph/settings/environments), on top of trusted
    # publishing's own repo/workflow-filename check below.
    environment: release
    permissions:
      pull-requests: write
      contents: write
      # Required for trusted publishing: release-plz exchanges this OIDC token for a short-lived
      # crates.io publish token itself (same API calls as rust-lang/crates-io-auth-action), so no
      # CARGO_REGISTRY_TOKEN secret exists in this repo at all. Configured per-crate on crates.io
      # (Settings -> Trusted Publishing -> GitHub -> owner crates-lurey-io, repo retroglyph,
      # workflow release-plz.yml, environment release) for all 7 publishable crates.
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Open (or update) the PR with the next version bumps + changelog, computed from Conventional
  # Commits history since the last release. Lockstep versioning + a single combined PR (see
  # release-plz.toml and RELEASING.md), not one PR per crate.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No CARGO_REGISTRY_TOKEN here: release-pr never publishes, only opens/updates the
          # version-bump PR. A registry token is only needed by this job for private registries.
