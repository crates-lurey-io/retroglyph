name: Release-plz

# Automated release flow (see RELEASING.md):
#   - release-plz-release: on every push to main, publishes any crate whose Cargo.toml version is
#     ahead of crates.io (i.e. right after the Release PR merges), tags it, and creates the GitHub
#     release. A no-op when nothing is unpublished.
#   - release-plz-pr: on every push to main, opens/updates a standing Release PR that bumps each
#     changed crate's version and per-crate CHANGELOG.md from the conventional history. Runs after
#     release-plz-release (see `needs:` below) so it always sees that job's freshly created tags /
#     crates.io publishes -- without that ordering, the very push that merges the Release PR makes
#     both jobs start from the same pre-publish state, and release-plz-pr can race ahead and
#     re-propose the version that release-plz-release is in the middle of publishing, producing a
#     duplicate changelog entry for it (happened for real: PR #250, opened seconds after #248
#     merged, duplicated #248's just-landed `## [0.2.0+retroglyph-software]` entries). This is a
#     known release-plz footgun; see e.g.
#     https://github.com/MarcoIeni/release-plz/issues/1542.
#
# The developer never bumps a version or pushes a tag by hand: review PRs, then merge the Release PR.

on:
  push:
    branches: [main]
  # Lets an operator manually re-trigger this from the Actions tab or `gh workflow run` --
  # e.g. if the Release PR's branch ever needs recomputing without an incidental push to main
  # (this happened once: a history rewrite of an already-merged commit left the existing Release
  # PR branch diverged from the new main, and it silently failed to update in place).
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Publishes bumped crates once the Release PR is merged. The single human gate is that merge; the
  # `release` environment keeps its main-only branch policy but no longer requires a separate
  # reviewer (a GitHub environment setting, not expressible here).
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    # Don't run two publish attempts at once; a concurrent double-publish surfaces confusing
    # "already exists" errors even though release-plz skips already-published versions.
    concurrency:
      group: release-plz-release-${{ github.ref }}
      cancel-in-progress: false
    environment: release
    permissions:
      contents: write
      # Trusted publishing: release-plz exchanges this OIDC token for a short-lived crates.io token
      # itself, so there is no CARGO_REGISTRY_TOKEN secret. Configured per-crate on crates.io
      # (Settings -> Trusted Publishing) for all seven publishable crates.
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Maintains the standing Release PR. Runs cargo-semver-checks (release-plz.toml semver_check) to
  # keep each proposed bump adequate for the detected API changes.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    # Always wait for the publish job on this same push to finish first -- see the top-of-file
    # comment for why (avoids racing release-plz-release and duplicating a changelog entry for the
    # version it's in the middle of publishing).
    needs: release-plz-release
    # Never run two PR updates concurrently, but don't cancel an in-flight one mid-write.
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          # NOTE: GitHub's loop-prevention only blocks `push`-triggered workflows from a
          # GITHUB_TOKEN-authored push (that's why release-plz-pr, itself push-triggered, doesn't
          # re-trigger itself); it does NOT apply to ci.yml, which is `pull_request`-triggered and
          # therefore DOES run against this Release PR. That's exactly what caught
          # https://github.com/crates-lurey-io/retroglyph/pull/90 and /pull/248's format/lint
          # failures below.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # release-plz's cliff.toml-driven CHANGELOG.md generation doesn't reliably land on
      # prettier's/markdownlint's blank-line normalization -- e.g. PR #248 still had 2 blank lines
      # at the boundary between a freshly rendered release entry and the existing file's body
      # after cliff.toml's own postprocessor squashed a 3-blank-line run to 1, because release-plz's
      # header-preserving splice (concatenating the rendered entry with the old file's body
      # verbatim) adds newlines of its own on top. Rather than keep chasing that concatenation's
      # exact newline count across release-plz versions, just run the same formatters CI's
      # `format`/`lint` jobs enforce directly on the Release PR branch, and push a fixup commit if
      # they change anything.
      #
      # `prs_created` is misleadingly named: the composite action sets it whenever `prs` is
      # non-empty, i.e. whenever a release PR exists after this run (created OR just updated) --
      # not only on first creation -- so this step runs on essentially every push to main once the
      # standing Release PR exists, which is the common case.
      - name: Fix formatting on the Release PR
        if: steps.release-plz.outputs.prs_created == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ fromJSON(steps.release-plz.outputs.pr).number }}
        run: |
          set -e
          gh pr checkout "$PR_NUMBER"
          npm ci --prefix tools
          # Loop lint:fix + format to a fixed point instead of running each once: prettier isn't
          # always idempotent in a single --write pass on release-plz's raw, verbatim-spliced
          # commit-message content -- e.g. a PR body containing literal `cell_w * cell_h` (meant as
          # plain-text multiplication) parses as ambiguous markdown emphasis, and resolving that
          # ambiguity can itself produce output prettier still wants to change on a second pass
          # (reproduced for real: PR #318's crates/software/CHANGELOG.md entry for #328 needed two
          # `prettier --write` passes to converge; the single-pass version of this step landed a
          # partial fix that still failed `prettier --check` in CI). markdownlint --fix runs before
          # prettier --write in each iteration because it can itself introduce a prettier violation
          # (reproduced locally fixing PR #248), so prettier's output is always what's checked for
          # convergence and ultimately committed.
          for _ in 1 2 3 4 5; do
            npm run --prefix tools lint:fix
            npm run --prefix tools format
            if npm run --prefix tools format:check > /dev/null 2>&1; then
              break
            fi
          done
          # Belt-and-suspenders: fail loudly instead of committing/pushing content that still isn't
          # converged after 5 rounds, rather than silently leaving CI to fail on the pushed commit
          # the way the single-pass version of this step did.
          npm run --prefix tools format:check

          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "chore: fix formatting on the Release PR"
            git push
          else
            echo "Nothing to fix, formatters made no changes."
          fi
