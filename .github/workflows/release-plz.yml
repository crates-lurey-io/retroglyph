name: Release-plz

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Publish crates whose Cargo.toml version doesn't match the last release-plz PR's tag yet --
  # i.e. runs after a release-plz PR (job below) has been reviewed and merged.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Open (or update) the PR with the next version bumps + changelog, computed from Conventional
  # Commits history since the last release. Lockstep versioning + a single combined PR (see
  # release-plz.toml and RELEASING.md), not one PR per crate.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
