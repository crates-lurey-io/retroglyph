name: Release-plz

# Automated release flow (see RELEASING.md):
#   - release-plz-pr: on every push to main, opens/updates a standing Release PR that bumps each
#     changed crate's version and per-crate CHANGELOG.md from the conventional history.
#   - release-plz-release: on every push to main, publishes any crate whose Cargo.toml version is
#     ahead of crates.io (i.e. right after the Release PR merges), tags it, and creates the GitHub
#     release. A no-op when nothing is unpublished.
#
# The developer never bumps a version or pushes a tag by hand: review PRs, then merge the Release PR.

on:
  push:
    branches: [main]
  # Lets an operator manually re-trigger this from the Actions tab or `gh workflow run` --
  # e.g. if the Release PR's branch ever needs recomputing without an incidental push to main
  # (this happened once: a history rewrite of an already-merged commit left the existing Release
  # PR branch diverged from the new main, and it silently failed to update in place).
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Publishes bumped crates once the Release PR is merged. The single human gate is that merge; the
  # `release` environment keeps its main-only branch policy but no longer requires a separate
  # reviewer (a GitHub environment setting, not expressible here).
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    # Don't run two publish attempts at once; a concurrent double-publish surfaces confusing
    # "already exists" errors even though release-plz skips already-published versions.
    concurrency:
      group: release-plz-release-${{ github.ref }}
      cancel-in-progress: false
    environment: release
    permissions:
      contents: write
      # Trusted publishing: release-plz exchanges this OIDC token for a short-lived crates.io token
      # itself, so there is no CARGO_REGISTRY_TOKEN secret. Configured per-crate on crates.io
      # (Settings -> Trusted Publishing) for all seven publishable crates.
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Maintains the standing Release PR. Runs cargo-semver-checks (release-plz.toml semver_check) to
  # keep each proposed bump adequate for the detected API changes.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    # Never run two PR updates concurrently, but don't cancel an in-flight one mid-write.
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          # NOTE: a Release PR opened with the default GITHUB_TOKEN does not trigger other
          # workflows (GitHub's loop-prevention), so CI won't run on the Release PR itself. If that
          # becomes a problem, swap in a GitHub App token or PAT here (see release-plz docs).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
