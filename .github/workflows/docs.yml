name: Docs

on:
  push:
    branches: ['main']

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - uses: cargo-bins/cargo-binstall@v1.13.0

      - name: Install cargo-llms-txt
        run: cargo binstall cargo-llms-txt --no-confirm -q

      - name: Build docs
        run: just doc

      # ── WASM examples ────────────────────────────────────────────────────

      - name: Install wasm-bindgen-cli
        # Version must match the wasm-bindgen dev-dependency in Cargo.toml.
        run: cargo install wasm-bindgen-cli --version 0.2.106

      - name: Build WASM examples (software-default-font)
        run: |
          cargo build --release \
            --target wasm32-unknown-unknown \
            --features software-default-font \
            --example dungeon_room \
            --example sokoban \
            --example roguelike_dungeon \
            --example scrolling_roguelike \
            --example subpixel \
            --example dirty_viz
        continue-on-error: true

      - name: Build WASM examples (software-tilesets)
        run: |
          cargo build --release \
            --target wasm32-unknown-unknown \
            --features software-tilesets,software-default-font \
            --example tileset \
            --example sprite_stress
        continue-on-error: true

      - name: Package WASM examples
        run: |
          EXAMPLES=(dungeon_room sokoban roguelike_dungeon scrolling_roguelike subpixel dirty_viz tileset sprite_stress)
          for ex in "${EXAMPLES[@]}"; do
            wasm="${PWD}/target/wasm32-unknown-unknown/release/examples/${ex}.wasm"
            if [ ! -f "$wasm" ]; then
              echo "Skipping $ex — wasm not built"
              continue
            fi
            outdir="target/doc/examples/${ex}"
            mkdir -p "$outdir"
            "$CARGO_HOME/bin/wasm-bindgen" --target web --out-dir "$outdir" "$wasm"
            cat > "$outdir/index.html" <<HTML
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>retroglyph — ${ex}</title>
            <style>
              html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }
              canvas { display: block; }
            </style>
          </head>
          <body>
            <script type="module">
              import init from './${ex}.js';
              init();
            </script>
          </body>
          </html>
          HTML
          done
        continue-on-error: true

      - name: Generate examples index
        run: |
          mkdir -p target/doc/examples
          # Only list examples that were actually built.
          entries=""
          for ex in dungeon_room sokoban roguelike_dungeon scrolling_roguelike subpixel dirty_viz tileset sprite_stress; do
            if [ -f "target/doc/examples/${ex}/index.html" ]; then
              entries="${entries}<li><a href=\"${ex}/\">${ex}</a></li>"$'\n'
            fi
          done
          cat > target/doc/examples/index.html <<HTML
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>retroglyph — interactive examples</title>
            <style>
              body { font-family: monospace; background: #111; color: #ccc; padding: 2rem; }
              a { color: #7af; }
              h1 { color: #fff; }
            </style>
          </head>
          <body>
            <h1>retroglyph — interactive examples</h1>
            <p>These run entirely in the browser via WebAssembly.</p>
            <ul>
          ${entries}
            </ul>
            <p><a href="../retroglyph/">API documentation</a></p>
          </body>
          </html>
          HTML
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
