name: Docs

on:
  push:
    branches: ['main']

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      pages: write
    steps:
      - uses: actions/checkout@v4

      # Ensures the repo's Pages site exists (source = GitHub Actions) before
      # we try to deploy to it. Without this, a Pages site that gets disabled
      # (e.g. after a repo transfer/settings reset) silently 404s forever even
      # though the workflow itself keeps reporting success.
      - uses: actions/configure-pages@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - uses: cargo-bins/cargo-binstall@v1.13.0

      - name: Install cargo-llms-txt
        run: cargo binstall cargo-llms-txt --no-confirm -q

      - name: Build docs
        run: just doc

      # ── WASM examples ────────────────────────────────────────────────────
      #
      # TODO: this whole section was removed along with the old crates/examples/.
      # It built a fixed list of demo binaries (dungeon_room, sokoban, hex_battle,
      # etc.) for each backend variant (Software/Headless/Terminal), driven by
      # `examples/runner.rs --manifest` as the source of truth for which examples
      # get which variant, then wasm-bindgen'd and packaged each into
      # target/doc/examples/<name>/<variant>/ using the templates under
      # docs/templates/examples/. Re-add once the new examples/ crate has actual
      # WASM-capable examples and a runner manifest again; see git history for
      # the removed steps (Install wasm-bindgen-cli through Generate examples
      # index) as a starting point.

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
