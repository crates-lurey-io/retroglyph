name: Docs

on:
  push:
    branches: ['main']

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      pages: write
    steps:
      - uses: actions/checkout@v4

      # Ensures the repo's Pages site exists (source = GitHub Actions) before
      # we try to deploy to it. Without this, a Pages site that gets disabled
      # (e.g. after a repo transfer/settings reset) silently 404s forever even
      # though the workflow itself keeps reporting success.
      - uses: actions/configure-pages@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - uses: cargo-bins/cargo-binstall@v1.13.0

      - name: Install cargo-llms-txt
        run: cargo binstall cargo-llms-txt --no-confirm -q

      - name: Build docs
        run: just doc

      # ── WASM examples ────────────────────────────────────────────────────
      #
      # Every example in examples/examples/*.rs is built for all three
      # WASM-capable backend variants (Headless/Terminal/Software) and
      # packaged into target/doc/examples/<name>/<variant>/, plus an index.
      # No manifest to keep in sync: see tools/build-wasm-examples.sh.
      # `cargo bin --install` (same as `just setup-tools`) builds/caches
      # wasm-bindgen at the version pinned in the workspace root Cargo.toml's
      # [workspace.metadata.bin] -- see that entry's comment for why the
      # version must match crates/*/Cargo.toml's wasm-bindgen dependency.
      - name: Build WASM examples
        run: |
          cargo bin --install
          tools/build-wasm-examples.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
