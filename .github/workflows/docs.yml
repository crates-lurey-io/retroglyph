name: Docs

on:
  push:
    branches: ['main']

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      pages: write
    steps:
      - uses: actions/checkout@v4

      # Ensures the repo's Pages site exists (source = GitHub Actions) before
      # we try to deploy to it. Without this, a Pages site that gets disabled
      # (e.g. after a repo transfer/settings reset) silently 404s forever even
      # though the workflow itself keeps reporting success.
      - uses: actions/configure-pages@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - uses: cargo-bins/cargo-binstall@v1.13.0

      - name: Install cargo-llms-txt
        run: cargo binstall cargo-llms-txt --no-confirm -q

      - name: Build docs
        run: just doc

      # ── WASM examples ────────────────────────────────────────────────────

      - name: Install wasm-bindgen-cli
        # Version must match the wasm-bindgen dev-dependency in Cargo.toml.
        run: cargo install wasm-bindgen-cli --version 0.2.106

      - name: Build WASM examples (default-font)
        run: |
          cargo build --release -p retroglyph-examples \
            --target wasm32-unknown-unknown \
            --features default-font \
            --example dungeon_room \
            --example sokoban \
            --example roguelike_dungeon \
            --example scrolling_roguelike \
            --example dashboard \
            --example subpixel \
            --example dirty_viz \
            --example responsive_game_ui
        continue-on-error: true

      - name: Build WASM examples (tilesets)
        run: |
          cargo build --release -p retroglyph-examples \
            --target wasm32-unknown-unknown \
            --features tilesets,default-font \
            --example tileset \
            --example sprite_stress \
            --example hex_battle
        continue-on-error: true

      # Each of Software/Headless/Terminal must be packaged (wasm-bindgen'd
      # into target/doc/) immediately after its own build, before the next
      # variant's build runs: all three build the *same* example name to the
      # *same* output path (target/wasm32-unknown-unknown/release/examples/
      # <name>.wasm — Cargo feature flags don't affect the artifact filename),
      # so building, say, Terminal before Headless is packaged would silently
      # clobber Headless's .wasm before it's ever wasm-bindgen'd. Keep
      # build+package interleaved per backend (Software, then Headless, then
      # Terminal) rather than batching all builds before all packaging.
      #
      # Every build step above is also `continue-on-error: true`, so a
      # *later* build can still fail after an *earlier* one succeeded,
      # leaving a stale earlier-variant .wasm at the shared path when a later
      # package step runs. `.github/scripts/verify-wasm-exports.sh` guards
      # each package step below against exactly that: it checks the
      # wasm-bindgen'd .js has the exports its own variant's template needs
      # (and, for Software, that no Headless/Terminal export leaked in from a
      # stale build) before writing the template, skipping with a warning
      # instead of shipping a broken but index-linked demo.
      - name: Package WASM examples (Software)
        run: |
          EXAMPLES=$(cargo run -q -p retroglyph-examples --example runner -- --manifest | awk -F'\t' '$2 == 1 { print $1 }')
          for ex in $EXAMPLES; do
            wasm="${PWD}/target/wasm32-unknown-unknown/release/examples/${ex}.wasm"
            if [ ! -f "$wasm" ]; then
              echo "Skipping $ex — wasm not built"
              continue
            fi
            outdir="target/doc/examples/${ex}/software"
            mkdir -p "$outdir"
            "$CARGO_HOME/bin/wasm-bindgen" --target web --out-dir "$outdir" "$wasm"
            if ! .github/scripts/verify-wasm-exports.sh "$outdir/${ex}.js" software; then
              echo "Skipping $ex (software) — export verification failed, see above"
              rm -rf "$outdir"
              continue
            fi
            sed -e "s/__EXAMPLE__/${ex}/g" docs/templates/examples/software-template.html > "$outdir/index.html"
          done
        continue-on-error: true

      - name: Build WASM Headless examples
        # Browser "Headless" demos (no canvas/window): a Terminal<Headless>
        # driven by requestAnimationFrame + button/keyboard input, rendered
        # as text into a <pre>. See retroglyph-examples' `wasm-headless`
        # feature and `util::wasm_headless_entry!`. Only examples with
        # `docs_headless: true` in examples/runner.rs's EXAMPLES table are
        # built here — `--manifest` is this workflow's single source of
        # truth for that list (also consumed below in "Generate examples
        # index"), so runner.rs stays the one place that list is edited.
        # Runs after Software is packaged; see the ordering note above.
        run: |
          HEADLESS_EXAMPLES=$(cargo run -q -p retroglyph-examples --example runner -- --manifest | awk -F'\t' '$3 == 1 { print $1 }')
          if [ -z "$HEADLESS_EXAMPLES" ]; then
            echo "No examples with docs_headless: true; skipping."
            exit 0
          fi
          ARGS=()
          for ex in $HEADLESS_EXAMPLES; do
            ARGS+=(--example "$ex")
          done
          cargo build --release -p retroglyph-examples \
            --target wasm32-unknown-unknown \
            --features wasm-headless \
            "${ARGS[@]}"
        continue-on-error: true

      - name: Package WASM examples (Headless)
        run: |
          HEADLESS_EXAMPLES=$(cargo run -q -p retroglyph-examples --example runner -- --manifest | awk -F'\t' '$3 == 1 { print $1 }')
          for ex in $HEADLESS_EXAMPLES; do
            wasm="${PWD}/target/wasm32-unknown-unknown/release/examples/${ex}.wasm"
            if [ ! -f "$wasm" ]; then
              echo "Skipping $ex — headless wasm not built"
              continue
            fi
            outdir="target/doc/examples/${ex}/headless"
            mkdir -p "$outdir"
            "$CARGO_HOME/bin/wasm-bindgen" --target web --out-dir "$outdir" "$wasm"
            if ! .github/scripts/verify-wasm-exports.sh "$outdir/${ex}.js" headless; then
              echo "Skipping $ex (headless) — export verification failed, see above"
              rm -rf "$outdir"
              continue
            fi
            sed -e "s/__EXAMPLE__/${ex}/g" docs/templates/examples/headless-template.html > "$outdir/index.html"
          done
        continue-on-error: true

      - name: Build WASM Terminal examples
        # Browser "Terminal" demos (xterm.js, no canvas/window): a
        # Terminal<TerminalWasm> driven by pushed key events, rendered as
        # real ANSI/SGR escape codes into an xterm.js instance. See
        # retroglyph-examples' `wasm-terminal` feature and
        # `util::wasm_terminal_entry!`. Only examples with `docs_terminal:
        # true` in examples/runner.rs's EXAMPLES table are built here —
        # `--manifest` is this workflow's single source of truth for that
        # list (also consumed below in "Generate examples index"), so
        # runner.rs stays the one place that list is edited. Runs after
        # Headless is packaged; see the ordering note above.
        run: |
          TERMINAL_EXAMPLES=$(cargo run -q -p retroglyph-examples --example runner -- --manifest | awk -F'\t' '$4 == 1 { print $1 }')
          if [ -z "$TERMINAL_EXAMPLES" ]; then
            echo "No examples with docs_terminal: true; skipping."
            exit 0
          fi
          ARGS=()
          for ex in $TERMINAL_EXAMPLES; do
            ARGS+=(--example "$ex")
          done
          cargo build --release -p retroglyph-examples \
            --target wasm32-unknown-unknown \
            --features wasm-terminal \
            "${ARGS[@]}"
        continue-on-error: true

      - name: Package WASM examples (Terminal)
        run: |
          TERMINAL_EXAMPLES=$(cargo run -q -p retroglyph-examples --example runner -- --manifest | awk -F'\t' '$4 == 1 { print $1 }')
          for ex in $TERMINAL_EXAMPLES; do
            wasm="${PWD}/target/wasm32-unknown-unknown/release/examples/${ex}.wasm"
            if [ ! -f "$wasm" ]; then
              echo "Skipping $ex — terminal wasm not built"
              continue
            fi
            outdir="target/doc/examples/${ex}/terminal"
            mkdir -p "$outdir"
            "$CARGO_HOME/bin/wasm-bindgen" --target web --out-dir "$outdir" "$wasm"
            if ! .github/scripts/verify-wasm-exports.sh "$outdir/${ex}.js" terminal; then
              echo "Skipping $ex (terminal) — export verification failed, see above"
              rm -rf "$outdir"
              continue
            fi
            sed -e "s/__EXAMPLE__/${ex}/g" docs/templates/examples/terminal-template.html > "$outdir/index.html"
          done
        continue-on-error: true

      - name: Generate examples index
        run: |
          mkdir -p target/doc/examples
          MANIFEST=$(cargo run -q -p retroglyph-examples --example runner -- --manifest)
          rows=""
          while IFS=$'\t' read -r ex wasm_software docs_headless docs_terminal; do
            [ -z "$ex" ] && continue

            if [ "$docs_headless" = "1" ] && [ -f "target/doc/examples/${ex}/headless/index.html" ]; then
              headless_cell="<td><a href=\"${ex}/headless/\">Headless</a></td>"
            else
              headless_cell="<td><span class=\"unavailable\">Headless</span></td>"
            fi

            if [ "$docs_terminal" = "1" ] && [ -f "target/doc/examples/${ex}/terminal/index.html" ]; then
              terminal_cell="<td><a href=\"${ex}/terminal/\">Terminal</a></td>"
            else
              terminal_cell="<td><span class=\"unavailable\">Terminal</span></td>"
            fi

            if [ "$wasm_software" = "1" ] && [ -f "target/doc/examples/${ex}/software/index.html" ]; then
              software_cell="<td><a href=\"${ex}/software/\">Software</a></td>"
            else
              software_cell="<td><span class=\"unavailable\">Software</span></td>"
            fi

            rows="${rows}<tr><td class=\"example\">${ex}</td>${headless_cell}${terminal_cell}${software_cell}</tr>"$'\n'
          done <<< "$MANIFEST"

          python3 - "$rows" <<'PYEOF'
          import sys
          rows = sys.argv[1]
          with open("docs/templates/examples/index-template.html", encoding="utf-8") as f:
              template = f.read()
          with open("target/doc/examples/index.html", "w", encoding="utf-8") as f:
              f.write(template.replace("__ROWS__", rows))
          PYEOF
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
