# Path-based PR labeling config for actions/labeler (see .github/workflows/labeler.yml).
# Applies every matching c: label; a PR touching multiple crates gets multiple labels.
# sync-labels: true in the workflow removes a c: label again if a later push no longer
# touches that crate's paths.

'c:core':
  - changed-files:
      - any-glob-to-any-file: 'crates/core/**'

'c:terminal':
  - changed-files:
      - any-glob-to-any-file: 'crates/terminal/**'

'c:crossterm':
  - changed-files:
      - any-glob-to-any-file: 'crates/crossterm/**'

'c:terminal-wasm':
  - changed-files:
      - any-glob-to-any-file: 'crates/terminal-wasm/**'

'c:software':
  - changed-files:
      - any-glob-to-any-file: 'crates/software/**'

'c:window':
  - changed-files:
      - any-glob-to-any-file: 'crates/window/**'

'c:widgets':
  - changed-files:
      - any-glob-to-any-file: 'crates/widgets/**'

'c:examples':
  - changed-files:
      - any-glob-to-any-file: 'examples/**'

# Anything outside crates/*/ and examples/ is workspace-wide: root Cargo.toml/Cargo.lock, CI,
# Justfile, docs/, root README/AGENTS/STYLE_GUIDE, tools/, etc.
#
# `any-glob-to-any-file` matches each pattern independently and ORs the results, so a negation
# entry like '!crates/**' matches virtually every file on its own (anything not under crates/),
# which defeats the intended "everything except crates/examples" exclusion -- see #187. Instead:
#   - Enumerate the known workspace-level paths explicitly (fires per-file, combines correctly
#     with per-crate labels on mixed PRs).
#   - Fall back to `all-globs-to-all-files` on the negations, which requires *every* changed file
#     in the PR to be outside crates/examples -- a correct (if coarser) catch-all for new root
#     files not yet in the enumerated list above.
'c:workspace':
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Justfile'
              - 'README.md'
              - 'AGENTS.md'
              - 'STYLE_GUIDE.md'
              - 'RELEASING.md'
              - '.github/**'
              - 'docs/**'
              - 'tools/**'
      - changed-files:
          - all-globs-to-all-files:
              - '!crates/**'
              - '!examples/**'
