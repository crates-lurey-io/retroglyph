# Source of truth for repo labels. Applied via .github/scripts/sync-labels.sh (run manually by a
# maintainer with `gh` auth; not run in CI to avoid needing elevated token scopes on every push).
#
# c: <crate>  - which crate/area the issue or PR touches (mirrors Conventional Commit scopes)
#
# This project uses Github 2026's "Type" and "Priority" fields instead of labels.

- name: 'c:core'
  color: '1D76DB'
  description: 'crates/core'
- name: 'c:terminal'
  color: '1D76DB'
  description: 'crates/terminal'
- name: 'c:crossterm'
  color: '1D76DB'
  description: 'crates/crossterm'
- name: 'c:terminal-wasm'
  color: '1D76DB'
  description: 'crates/terminal-wasm'
- name: 'c:software'
  color: '1D76DB'
  description: 'crates/software'
- name: 'c:gl'
  color: '1D76DB'
  description: 'crates/gl'
- name: 'c:font'
  color: '1D76DB'
  description: 'crates/font'
- name: 'c:window'
  color: '1D76DB'
  description: 'crates/window'
- name: 'c:widgets'
  color: '1D76DB'
  description: 'crates/widgets'
- name: 'c:examples'
  color: '1D76DB'
  description: 'examples/'
- name: 'c:workspace'
  color: '0E4A8C'
  description: 'Workspace-wide: tooling, CI, root docs, release config'

- name: 'breaking'
  color: 'E99695'
  description: 'Semver-breaking change'
- name: 'benchmark'
  color: '0075CA'
  description: 'Run benchmarks on this PR'
- name: 'needs-triage'
  color: 'EDEDED'
  description: 'Not yet reviewed by a maintainer'
- name: 'blocked'
  color: '000000'
  description: 'Waiting on an external dependency or decision'
