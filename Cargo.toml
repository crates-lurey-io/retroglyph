[workspace]
members = ["tools/cargo-bin"]
resolver = "2"

[workspace.metadata.bin]
wasm-server-runner = { version = "1.0.1" }

[package]
name = "retroglyph"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
authors = ["Matan Lurey <matan@lurey.org>"]
license = "MIT"
description = "A terminal/grid rendering library for roguelikes"
repository = "https://github.com/crates-lurey-io/retroglyph"
keywords = ["roguelike", "terminal", "grid", "gamedev"]
categories = ["game-development", "graphics"]

[lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"
unreachable_pub = "warn"
unused_qualifications = "warn"

[lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
nursery = { level = "deny", priority = -1 }
must_use_candidate = "deny"
missing_errors_doc = "deny"
missing_panics_doc = "deny"
module_name_repetitions = "allow"

[dependencies]
ixy = "0.6.0-alpha.7"
grixy = { version = "0.6.0-alpha.7", features = ["alloc", "buffer"] }
unicode-width = "0.2"
bitflags = "2.4"
unicode-segmentation = { version = "1.13", default-features = false, optional = true }
crossterm = { version = "0.28", optional = true }
winit = { version = "0.30", optional = true }
softbuffer = { version = "0.4", optional = true }
image = { version = "0.25", optional = true, default-features = false, features = ["png"] }
alpha-blend = { version = "0.2", optional = true, default-features = false, features = ["std"] }
log = { version = "0.4", optional = true }


[features]
default = ["std", "egc"]
std = []
egc = ["dep:unicode-segmentation"]
crossterm = ["dep:crossterm", "std"]
software = ["dep:winit", "dep:softbuffer", "dep:log", "std"]
software-tilesets = ["software", "dep:image", "dep:alpha-blend", "dep:log"]
software-default-font = ["software"]

[[example]]
name = "crossterm_demo"
required-features = ["crossterm"]

[[example]]
name = "software_demo"
required-features = ["software-default-font"]

[[example]]
name = "tileset_demo"
required-features = ["software-tilesets", "software-default-font"]

[[example]]
name = "software_subpixel_demo"
required-features = ["software-default-font"]

[[example]]
name = "wasm_demo"
required-features = ["software-default-font"]

[[example]]
name = "headless_demo"
required-features = []

[[example]]
name = "runner"
required-features = []

[target.'cfg(target_arch = "wasm32")'.dev-dependencies]
wasm-bindgen = "=0.2.106"
console_error_panic_hook = "0.1"

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
portable-pty = "0.9.0"
vt100 = "0.15"

[dev-dependencies]
toml = "0.8"
serde = { version = "1", features = ["derive"] }
image = { version = "0.25", default-features = false, features = ["png"] }
insta = { version = "1.34", features = ["yaml"] }
